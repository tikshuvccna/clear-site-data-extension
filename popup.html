<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clear Site Data</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      width: 260px;
      color: #1f1f1f;
      background: #fff;
    }
    header {
      padding: 12px 14px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #3c4043;
      border-bottom: 1px solid #eee;
    }
    .primary {
      display: block;
      width: calc(100% - 20px);
      margin: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #1976d2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }
    .primary:hover { background: #1565c0; }
    .primary .kbd {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: .85;
      margin-top: 2px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      background: none;
      border: none;
      border-top: 1px solid #f1f1f1;
      cursor: pointer;
      text-align: left;
      color: #202124;
    }
    .item:hover { background: #f5f7fb; }
    .item .ico { font-size: 15px; width: 18px; text-align: center; }
    .danger { color: #c62828; }
    #status {
      font-size: 12px;
      padding: 8px 14px;
      min-height: 16px;
      color: #2e7d32;
    }
    /* Confirmation panel for the destructive "clear all" action */
    #confirm {
      display: none;
      padding: 12px 14px 14px;
      background: #fff4f4;
      border-top: 1px solid #f3c2c2;
    }
    #confirm.show { display: block; }
    #confirm .title {
      font-size: 13px;
      font-weight: 700;
      color: #b00020;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #confirm .msg {
      font-size: 12px;
      color: #5f1f1f;
      margin: 8px 0 4px;
      line-height: 1.4;
    }
    #confirm ul {
      margin: 4px 0 10px;
      padding-left: 18px;
      font-size: 12px;
      color: #5f1f1f;
    }
    #confirm .buttons { display: flex; gap: 8px; }
    #confirm button {
      flex: 1;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    #confirm .cancel { background: #e8eaed; color: #3c4043; }
    #confirm .cancel:hover { background: #dadce0; }
    #confirm .danger { background: #c62828; color: #fff; }
    #confirm .danger:hover { background: #b71c1c; }
  </style>
</head>
<body>
  <header>Clear Site Data</header>

  <button class="primary" data-action="clearThisSite">
    Clear THIS site now
    <span class="kbd">cache · cookies · storage  ·  shortcut: Alt+Shift+C</span>
  </button>

  <button class="item danger" data-action="clearAllSites">
    <span class="ico">🧹</span> Clear ALL sites' data (everything)
  </button>
  <button class="item" data-action="clearHistory">
    <span class="ico">🕘</span> Clear browsing history
  </button>
  <button class="item" data-action="openClean">
    <span class="ico">☑️</span> Choose what to clean…
  </button>
  <button class="item" data-action="openMemory">
    <span class="ico">📊</span> Show memory usage…
  </button>

  <div id="confirm">
    <div class="title">⚠️ Clear ALL sites' data?</div>
    <div class="msg">This wipes the whole browser, not just this site. You will be:</div>
    <ul>
      <li><b>Logged out of every website</b> (all cookies deleted)</li>
      <li>Cleared of all cache, local storage, IndexedDB &amp; service workers</li>
      <li>Cleared of your download history</li>
    </ul>
    <div class="msg">This cannot be undone.</div>
    <div class="buttons">
      <button class="cancel" id="confirmCancel">Cancel</button>
      <button class="danger" id="confirmGo">Yes, clear everything</button>
    </div>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
