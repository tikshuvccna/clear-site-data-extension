<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Memory usage</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 24px auto;
      max-width: 460px;
      color: #1f1f1f;
      padding: 0 16px;
    }
    h1 { font-size: 18px; margin: 0 0 16px; }
    .stat { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #eee; }
    .stat span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; }
    .bar { height: 14px; background: #e8eaed; border-radius: 7px; overflow: hidden; margin: 14px 0 6px; }
    .bar > div { height: 100%; background: #1976d2; width: 0; transition: width .3s; }
    .caption { font-size: 12px; color: #5f6368; }
    button { margin-top: 18px; font-size: 13px; padding: 8px 14px; border: 1px solid #dadce0; border-radius: 8px; background: #f8f9fa; cursor: pointer; }
    button:hover { background: #f1f3f4; }
  </style>
</head>
<body>
  <h1>System memory usage</h1>
  <div class="stat"><span>Total RAM</span><span id="total">—</span></div>
  <div class="stat"><span>Available</span><span id="avail">—</span></div>
  <div class="stat"><span>In use</span><span id="used">—</span></div>
  <div class="bar"><div id="barFill"></div></div>
  <div class="caption" id="pct">—</div>
  <button id="refresh">Refresh</button>
  <script src="memory.js"></script>
</body>
</html>
